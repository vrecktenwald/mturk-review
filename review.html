<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Answer Review</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f8f9fa; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .header-info { background: #f1f5f9; padding: 12px 18px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95em; }
        .info-label { font-weight: bold; color: #444; }
        .q { border: 2px solid #e0e0e0; padding: 20px; margin: 18px 0; border-radius: 10px; background: #fafafa; }
        .student { color: #d32f2f; font-weight: bold; }
        .correct { color: #2e7d32; font-weight: bold; }
        button { padding: 14px 28px; font-size: 17px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Answer Review</h1>
        
        <div class="header-info">
            <strong>Student:</strong> <span id="studentName">Unknown</span><br>
            <strong>Worksheet:</strong> <span id="worksheetTitle">Unknown</span><br>
            <span id="batchInfo" style="display:none;">
                <strong>Batch ID:</strong> <span id="batchId"></span> | 
                <strong>Page:</strong> <span id="pageIndex"></span>
            </span>
        </div>

        <div id="questionsContainer"></div>

        <h3>Overall Comments (Optional)</h3>
        <textarea id="overallComments" rows="6" style="width:100%;"></textarea>

        <br><br>
        <button onclick="submitReview()">Submit Review</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // Display main information
        document.getElementById('studentName').textContent = params.get('student') || 'Unknown Student';
        document.getElementById('worksheetTitle').textContent = params.get('worksheet') || 'Unknown Worksheet';

        // Display Batch ID and Page Index (read-only, less prominent)
        const batchId = params.get('batchId');
        const pageIndex = params.get('pageIndex');
        
        if (batchId || pageIndex) {
            document.getElementById('batchInfo').style.display = 'inline';
            if (batchId) document.getElementById('batchId').textContent = batchId;
            if (pageIndex) document.getElementById('pageIndex').textContent = pageIndex;
        }

        // Sample mismatches (replace with real data later if needed)
        const mismatches = [
            { number: "01", question: "3 x 2", studentAnswer: "5", correctAnswer: "6" },
            { number: "03", question: "2 x 2", studentAnswer: "4", correctAnswer: "6" }
        ];

        const container = document.getElementById('questionsContainer');
        mismatches.forEach(item => {
            container.innerHTML += `
                <div class="q">
                    <strong>Problem #${item.number}:</strong> ${item.question}<br/><br/>
                    <strong>Student Answer:</strong> <span class="student">${item.studentAnswer}</span><br/>
                    <strong>Correct Answer:</strong> <span class="correct">${item.correctAnswer}</span><br/><br/>
                    
                    <strong>Your Review:</strong><br/>
                    <input type="radio" name="review_${item.number}" value="acceptable" required> Acceptable / Minor variation<br/>
                    <input type="radio" name="review_${item.number}" value="incorrect"> Clearly Incorrect<br/><br/>
                    
                    <strong>Your Corrected Answer:</strong><br/>
                    <input type="text" name="correction_${item.number}" placeholder="Enter correct answer if needed">
                </div>`;
        });

                function submitHIT() {
                // Read values dynamically from URL parameters (recommended)
                const urlParams = new URLSearchParams(window.location.search);
                
                const reviewData = {
                    student: urlParams.get('student') || "Unknown",
                    worksheet: urlParams.get('worksheet') || "Unknown",
                    batchId: urlParams.get('batchId') || "",
                    pageIndex: urlParams.get('pageIndex') || "",
                    mismatchesReviewed: document.getElementById('mismatchCount') ? 
                                        parseInt(document.getElementById('mismatchCount').textContent) : 0,
                    
                    // Add any other dynamic fields from your page
                    overallFeedback: document.getElementById('overallComments') ? 
                                    document.getElementById('overallComments').value : "",
                    
                    timestamp: new Date().toISOString(),
                    // You can add more fields as needed
                };

                // Create form for MTurk submission
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = 'https://workersandbox.mturk.com/mturk/externalSubmit';  // Use production URL when live

                // Required: assignmentId
                const assignmentId = urlParams.get('assignmentId');
                if (assignmentId) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'assignmentId';
                    input.value = assignmentId;
                    form.appendChild(input);
                }

                // Send all your data
                const dataInput = document.createElement('input');
                dataInput.type = 'hidden';
                dataInput.name = 'answer';                    // MTurk standard field name
                dataInput.value = JSON.stringify(reviewData);
                form.appendChild(dataInput);

                document.body.appendChild(form);
                form.submit();
            }
    </script>

    <!-- Put this near the end of your page, before the closing </body> tag -->

    <div style="margin-top: 30px; text-align: center;">
        <button onclick="submitHIT()" 
                style="padding: 12px 24px; font-size: 16px; background-color: #ff9900; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Submit Review to MTurk
        </button>
    </div>

</body>
</html>
