<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Answer Review</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { background: #f1f5f9; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .q { 
            border: 2px solid #e2e8f0; 
            padding: 20px; 
            margin: 18px 0; 
            border-radius: 10px; 
            background: #fafafa; 
        }
        .type-mismatch { border-left: 6px solid #ef4444; background: #fee2e2; }
        .type-lowconf { border-left: 6px solid #f59e0b; background: #fef3c7; }
        .type-unrecognized { border-left: 6px solid #3b82f6; background: #dbeafe; }
        
        button { 
            padding: 14px 32px; 
            font-size: 17px; 
            background: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; }
        
        .info-label { font-weight: bold; color: #444; }
        textarea { width: 100%; min-height: 120px; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Answer Review</h1>
        
        <div class="header" id="headerInfo">
            <!-- Populated by JS -->
        </div>

        <div id="questionsContainer"></div>

        <h3>Overall Comments (Optional)</h3>
        <textarea id="overallComments" placeholder="Add any general feedback here..."></textarea>

        <br><br>
        <button onclick="submitHIT()" id="submitBtn">Submit Review to MTurk</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let reviewData = { reviewItems: [] };

        // Load data from URL parameter
        const dataParam = params.get('data');
        if (dataParam) {
            try {
                reviewData = JSON.parse(decodeURIComponent(dataParam));
            } catch (e) {
                console.error("Failed to parse review data", e);
            }
        }

        // Populate header
        const header = document.getElementById('headerInfo');
        header.innerHTML = `
            <strong>Student:</strong> ${reviewData.studentName || params.get('student') || 'Unknown'}<br>
            <strong>Worksheet:</strong> ${reviewData.worksheetTitle || params.get('worksheet') || 'Unknown'}<br>
            <strong>Items to Review:</strong> ${reviewData.totalItemsToReview || reviewData.reviewItems?.length || 0}
        `;

        // Render questions
        const container = document.getElementById('questionsContainer');
        const items = reviewData.reviewItems || [];

        items.forEach(item => {
            const num = item.Number || item.number || '';
            const type = item.Type || item.type || 'Mismatch';

            let typeClass = 'type-mismatch';
            if (type === 'LowConfidence') typeClass = 'type-lowconf';
            if (type === 'Unrecognized') typeClass = 'type-unrecognized';

            const html = `
                <div class="q ${typeClass}">
                    <strong>Problem #${num}:</strong> ${item.Question || item.question || ''}<br/><br/>
                    <strong>Student Answer:</strong> <span style="color:#d32f2f; font-weight:bold;">${item.StudentAnswer || item.studentAnswer || '—'}</span><br/>
                    <strong>Correct Answer:</strong> <span style="color:#166534; font-weight:bold;">${item.CorrectAnswer || item.correctAnswer || '—'}</span><br/><br/>
                    
                    <strong>Your Review:</strong><br/>
                    <label><input type="radio" name="review_${num}" value="acceptable"> Acceptable / Minor variation</label><br/>
                    <label><input type="radio" name="review_${num}" value="incorrect"> Clearly Incorrect</label><br/><br/>
                    
                    <strong>Corrected Answer (if needed):</strong><br/>
                    <input type="text" name="correction_${num}" placeholder="Enter corrected answer" style="width:100%; padding:8px; box-sizing:border-box;">
                </div>`;
            container.innerHTML += html;
        });

        // Submit function
        function submitHIT() {
            const reviewedItems = items.map(item => {
                const num = item.Number || item.number || '';
                const radio = document.querySelector(`input[name="review_${num}"]:checked`);
                const correction = document.querySelector(`input[name="correction_${num}"]`);

                return {
                    number: num,
                    question: item.Question || item.question,
                    studentAnswer: item.StudentAnswer || item.studentAnswer,
                    correctAnswer: item.CorrectAnswer || item.correctAnswer,
                    type: item.Type || item.type,
                    review: radio ? radio.value : null,
                    correctedAnswer: correction ? correction.value.trim() : ""
                };
            });

            const finalData = {
                workerId: params.get('workerId'),
                assignmentId: params.get('assignmentId'),
                hitId: params.get('hitId'),
                student: reviewData.studentName,
                worksheet: reviewData.worksheetTitle,
                batchId: params.get('batchId'),
                pageIndex: params.get('pageIndex'),
                totalItemsReviewed: reviewedItems.length,
                reviewedItems: reviewedItems,
                overallComments: document.getElementById('overallComments').value.trim(),
                timestamp: new Date().toISOString()
            };

            // MTurk submission
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://workersandbox.mturk.com/mturk/externalSubmit'; // Change to production when ready

            form.appendChild(createHiddenInput('assignmentId', params.get('assignmentId')));
            form.appendChild(createHiddenInput('answer', JSON.stringify(finalData)));

            document.body.appendChild(form);
            form.submit();
        }

        function createHiddenInput(name, value) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = name;
            input.value = value || '';
            return input;
        }
    </script>
</body>
</html>
